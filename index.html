<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>WeatherJS</title>
</head>
<body>
    <div class="weather-card">
        <div id="loader" class="loader hidden"></div>
        <h1>Weatherly</h1>
        <div class="nav-bar">
            <input type="text" class="city" placeholder="Enter your city...">
            <button type="button" class="button1"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button type="button" class="button2"><i class="fa-solid fa-location-dot"></i>Use precise location</button>
        </div>
        
        <div class="weather-info">
            <h2 class="cityName"></h2>
            <h2 class="temp"></h2>
            <p class="condition"></p>
            <p class="humidity"></p>
            <p class="wind "></p>
        </div>
    </div>
    
    <script src="./app.js"></script>
</body>
</html>
